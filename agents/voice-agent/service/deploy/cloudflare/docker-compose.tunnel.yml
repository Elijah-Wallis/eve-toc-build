# Production: 20 concurrent custom LLM calls. Scale replicas for more.
services:
  voice-agent:
    build:
      context: ../..
      dockerfile: Dockerfile
    environment:
      - PORT=8080
    expose:
      - "8080"
    restart: unless-stopped
    # Optional: resource limits for 20 concurrent WebSocket + LLM buffers
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M

  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run --token ${TUNNEL_TOKEN}
    depends_on:
      - voice-agent
    restart: unless-stopped

