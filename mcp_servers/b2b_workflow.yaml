retell_dashboard_settings_reminder:
  voicemail_detection: "ENABLE"
  auto_hangup_after_silence: "ENABLE"
  silence_timeout_seconds: 25
  end_call_after_consecutive_ivr_loops: 3
  max_outbound_turn_seconds: 11
  allow_barge_in: "ENABLE"
  recommended_notes:
