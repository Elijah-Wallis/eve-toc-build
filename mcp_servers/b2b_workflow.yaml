red_team_matrix:
  ivr_automated_attendant:
    - failure_mode: "Agent talks over menu tree"
      trigger_phrases: ["press 1", "please listen carefully", "for operator"]
      prevention_ref: "core_directives.NUCLEAR SILENCE + nuclear_silence_keywords"
      exact_script: "Thank you."
      prevention_comment: "One token then silence avoids collision."
    - failure_mode: "Speaks over legal recording disclaimer"
      trigger_phrases: ["this call may be recorded", "quality assurance"]
      prevention_ref: "h20"
      exact_script: "Understood, thank you."
      prevention_comment: "Legal-safe acknowledgment."
    - failure_mode: "Speaks during queue music"
      trigger_phrases: ["music on hold", "estimated wait time"]
      prevention_ref: "HOLD RULE"
      exact_script: "Thank you, I'll hold."
      prevention_comment: "No talk-over on music loops."
    - failure_mode: "Menu loop repeated 3+ times"
      trigger_phrases: ["please listen carefully", "main menu"]
      prevention_ref: "NUCLEAR SILENCE"
      exact_script: "Thank you."
      prevention_comment: "Avoid repetitive chatter."
    - failure_mode: "Directory-by-name trap"
      trigger_phrases: ["dial by name", "company directory"]
      prevention_ref: "NUCLEAR SILENCE"
      exact_script: "Thank you."
      prevention_comment: "Wait for human intervention."
    - failure_mode: "Emergency disclaimer interruption"
      trigger_phrases: ["medical emergency", "dial 911"]
      prevention_ref: "COMPLIANCE RULE"
      exact_script: "Understood."
      prevention_comment: "No unsafe overlap."
    - failure_mode: "Fax tone mistaken as person"
